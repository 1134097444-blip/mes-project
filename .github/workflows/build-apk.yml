name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: APK版本号
        required: false
        default: '1.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装前端依赖
        working-directory: frontend/web
        run: npm ci

      - name: 构建前端
        working-directory: frontend/web
        run: npm run build

      - name: Capacitor同步
        working-directory: frontend/web
        run: npx cap sync android

      - name: 安装SDK
        run: echo y | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager 'platforms;android-35' 'build-tools;34.0.0'

      - name: 构建APK
        working-directory: frontend/web/android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: 重命名APK
        run: |
          mv frontend/web/android/app/build/outputs/apk/debug/app-debug.apk MES-手持机APP-${{ github.event.inputs.version || '1.0' }}.apk

      - name: 上传APK（Actions内可下载）
        uses: actions/upload-artifact@v4
        with:
          name: MES-APP-debug
          path: MES-*.apk

      - name: 创建Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '1.0' }}-${{ github.run_number }}
          name: MES APP v${{ github.event.inputs.version || '1.0' }} (构建#${{ github.run_number }})
          body: |
            ## MES 手持机安卓 APP

            ### 安装方式
            1. 手持机浏览器打开本页面
            2. 下滑找到 Assets / 附件
            3. 点击 APK 文件直接下载安装

            ### 功能
            - PDA 扫码报工（支持离线）
            - 我的任务列表
            - 工序看板

            ### 后端地址
            需要连接 Steedos 后端 (http://172.16.20.179:5100)
          files: MES-*.apk
          draft: false
          prerelease: false
          generate_release_notes: false
