name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'APK 版本号'
        required: false
        default: '1.0'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/web/package-lock.json

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装前端依赖
        working-directory: frontend/web
        run: npm ci

      - name: 构建前端 (Vite)
        working-directory: frontend/web
        run: npm run build

      - name: Capacitor 同步到 Android
        working-directory: frontend/web
        run: npx cap sync android

      - name: 设置 ANDROID_HOME
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: 确保 Android SDK platform 已安装
        run: |
          if [ ! -d "$ANDROID_HOME/platforms/android-35" ]; then
            echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"
          fi

      - name: 构建 Debug APK
        working-directory: frontend/web/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: MES-APP-${{ github.event.inputs.version || '1.0' }}-debug
          path: frontend/web/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: 显示构建信息
        run: |
          echo "✅ APK 构建完成！"
          echo "   APK 路径: frontend/web/android/app/build/outputs/apk/debug/"
          echo "   下载方式: 点击上方 Summary → Artifacts → 下载"
